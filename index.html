<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ginyx-God_iven</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <img class="profil" src="images/IMG-20250913-WA0073.jpg" alt="photo de profil du site">
        <h1 class="nom">
            <span class="stroke">GI</span><span class="green">NYX</span><br>
            God_iven NDZAMACEL
        </h1>
       <nav>
        <a href="#apropos">A propos</a>
        <a href="#competences">Compétences</a>
        <a href="#projets">Projets</a>
        <a href="#contacts">Contacts</a>
       </nav>
    </header>
    <main>
        <div id="cursor"></div>
        <h1>bienvenue sur mon site</h1>
        <p>site en construction.</p>
    </main>
   <footer>
    Ginyx-God_iven &copy;
   </footer>
    <script>
         const cur = document.getElementById('cursor');
         document.addEventListener('mousemove', e => {
         cur.style.left = (e.clientX - 6) + 'px';
         cur.style.top  = (e.clientY - 6) + 'px';
        });
       const header = document.querySelector('header');
       const body = document.body;
       window.addEventListener('scroll', () => {
        if (window.scrollY> 50) {
            header.classList.add('side');
            body.classList.add('nav-side');
        } else {
            header.classList.remove('side');
            body.classList.remove('nav-side');
        }
       });

        window.addEventListener(
            'scroll', () =>{const navbar= document.querySelector('nav');
            const body= document.body;
            if (window.scrollY > 50) {
                navbar.classList.add('side');
                body.classList.add('nav-side');
            } else {
                navbar.classList.remove('side');
                body.classList.remove('nav-side');
            }
            });
    </script>
</body>
</html>
